<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Presente de Deus</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="nav-bar">
    <a href="/dashboard">Início</a>
    <a href="/produtos">Estoque</a>
    <a href="/carrinho">Vendas</a>
    <a href="/logout">Sair</a>
</nav>

<div class="main-container">
    <h1 class="page-title" th:text="${produto.id == null ? 'Novo Produto' : 'Editar Produto'}">Produto</h1>

    <div class="content-card" style="max-width: 600px; margin: 0 auto;">
        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
            <input type="hidden" th:field="*{id}">

            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nome do Artigo:</label>
            <input type="text" th:field="*{nome}" required style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc;">

            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Preço (R$):</label>
                    <input type="number" step="0.01" th:field="*{preco}" required style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Quantidade:</label>
                    <input type="number" th:field="*{quantidade}" required style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button type="submit" class="btn-sacro" style="flex: 1;">SALVAR NO SISTEMA</button>
                <a href="/produtos" class="btn-sacro" style="flex: 1; background: #666; border-color: #666; text-align: center;">CANCELAR</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
