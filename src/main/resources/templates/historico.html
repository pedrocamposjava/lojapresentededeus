<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Histórico de Vendas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* Estilo para organizar a lista de produtos dentro da célula */
        .lista-produtos-celula {
            text-align: left;
            padding-left: 15px;
            margin: 0;
            list-style-type: square;
        }

        /* Estilo do botão de excluir */
        .btn-excluir {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-excluir:hover {
            background-color: #bd2130;
        }
    </style>
</head>

<body>

<h1>Histórico de Vendas</h1>

<table>

    <thead>
    <tr>
        <th>ID</th>
        <th>Usuário</th>
        <th>Produtos</th> <th>Data</th>
        <th>Total</th>
        <th th:if="${session.usuarioLogado?.perfil == 'ADMIN'}">Ações</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="venda : ${vendas}">

        <td th:text="${venda.id}"></td>

        <td th:text="${venda.usuario?.login}"></td>

        <td>
            <ul class="lista-produtos-celula">
                <li th:each="item : ${venda.itens}">
                    <span th:text="${item.produto.nome}">Produto</span>
                    <span th:text="'(x' + ${item.quantidade} + ')'" style="color: #666; font-size: 0.85rem;">(x1)</span>
                </li>
            </ul>
        </td>

        <td th:text="${#temporals.format(venda.dataVenda, 'dd/MM/yyyy HH:mm')}"></td>

        <td th:text="'R$ ' + ${venda.total}"></td>

        <td th:if="${session.usuarioLogado?.perfil == 'ADMIN'}">
            <form th:action="@{/vendas/deletar/{id}(id=${venda.id})}" method="post"
                  onsubmit="return confirm('Deseja realmente apagar esta venda permanente do histórico?');"
                  style="margin: 0; padding: 0;">
                <button type="submit" class="btn-excluir">🗑️ Excluir</button>
            </form>
        </td>

    </tr>

    <tr th:if="${#lists.isEmpty(vendas)}">
        <td th:colspan="${session.usuarioLogado?.perfil == 'ADMIN'} ? 6 : 5" style="color: #777; padding: 20px;">
            Nenhuma venda registrada no histórico. ✨
        </td>
    </tr>

    </tbody>

</table>

</body>
</html>
